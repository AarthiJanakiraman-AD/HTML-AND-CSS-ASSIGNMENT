<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>day8</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 40px;
        text-align: center;
    }

    h2 {
        margin-top: 60px;
    }

   
    .box {
        width: 120px;
        height: 120px;
        margin: 40px auto;
        line-height: 120px;
        color: white;
        font-weight: bold;
    }

    

    .box-2d {
        background: #4caf50;
        animation: move2D 3s infinite alternate;
    }

    @keyframes move2D {
        0% {
            transform: translateX(0) rotate(0deg) scale(1);
        }
        100% {
            transform: translateX(200px) rotate(360deg) scale(1.2);
        }
    }

    
    .scene {
        perspective: 600px;
    }

    .box-3d {
        background: #f44336;
        animation: rotate3D 3s infinite linear;
        transform-style: preserve-3d;
    }

    @keyframes rotate3D {
        0% {
            transform: rotateX(0deg) rotateY(0deg);
        }
        100% {
            transform: rotateX(360deg) rotateY(360deg);
        }
    }
</style>
</head>

<body>


<h2>2D Animation</h2>
<p>Translate + Rotate + Scale</p>
<div class="box box-2d">2D</div>

<h2>3D Animation</h2>
<p>Rotate in 3D space</p>
<div class="scene">
    <div class="box box-3d">3D</div>
</div>

</body>
</html>
