<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day4</title>
    <head>

    <style>
        .box {
            background-color: lightblue;  
            color: darkblue;              
            height: 200px;                
            width: 300px;   
            font-size: 18px;               
            text-align: center;
            padding: 20px;               
           
        }


        .para{

            font-family: Arial, sans-serif;
            background-color: rgb(87, 223, 74); 
            font-size: 18px;               
            text-align: center;
            padding: 20px;
            height: 200px;                
            width: 300px;  

        }


    </style>
</head>

<body>

    <div class="box">
        This is CSS styling example
    </div>

    <div class="para">
        <p> CSS stands for Cascading Style Sheets</p>
    </div>

</body>
</html>
