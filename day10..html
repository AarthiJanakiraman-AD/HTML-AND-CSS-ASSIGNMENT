<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day10</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: auto;
        }
        
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
        }
        
        h2 {
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
        }
        
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        button {
            margin-top: 20px;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        th,
        td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #007BFF;
            color: white;
        }
        
        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>

    <div class="container">

        <section>
            <h2>Register User</h2>
            <form action="#">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">

                <button type="submit">Add User</button>
            </form>
        </section>

        <section>
            <h2>Registered Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td>Aarthi</td>
                        <td>aarthiarundhas@gmail.com</td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td>Arundhas</td>
                        <td>arundhasaarthi@gmail.com</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </div>

</body>

</html>
