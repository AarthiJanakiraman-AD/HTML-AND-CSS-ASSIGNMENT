<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY 5</title>
    <style>
        img {
            height: 42px;
            width: 180px;
        }
        body {

        header {

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
        }

        nav a:hover {
            color: orange;
        }

        
        .hero {
            height: 90vh;
            background-image: C:\Users\Sivanesh\Documents\dbms\day5; 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        
        .overlay {
           
            background-color: rgba(0, 0, 0, 0.4); 
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: rgb(49, 38, 38);
            padding: 20px;
        }

        .hero-text {
            font-size: 28px;
            max-width: 700px;
            line-height: 1.5;

    <header>

    </section>
