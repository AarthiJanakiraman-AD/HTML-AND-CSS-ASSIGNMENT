<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        h2 {
            margin-top: 40px;
        }
        /* Inline */
        
        .inline {
            display: inline;
            background: lightblue;
            padding: 10px;
            margin: 5px;
        }
        /* Block */
        
        .block {
            display: block;
            background: lightcoral;
            padding: 10px;
            margin: 5px 0;
        }
        /* Inline-block */
        
        .inline-block {
            display: inline-block;
            width: 120px;
            height: 60px;
            background: lightgreen;
            margin: 5px;
            text-align: center;
            line-height: 60px;
        }
        /* Flex */
        
        .flex {
            display: flex;
            gap: 10px;
            background: #eee;
            padding: 10px;
        }
        /* Flex items */
        
        .item {
            background: lightskyblue;
            padding: 20px;
        }
        /* Flex wrap */
        
        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #f3f3f3;
            padding: 10px;
        }
        
        .box {
            width: 150px;
            background: plum;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>CSS Display Property Examples</h1>

    <h2>1. display: inline</h2>
    <span class="inline">Inline 1</span>
    <span class="inline">Inline 2</span>
    <span class="inline">Inline 3</span>

    <h2>2. display: block</h2>
    <div class="block">Block 1</div>
    <div class="block">Block 2</div>
    <div class="block">Block 3</div>

    <h2>3. display: inline-block</h2>
    <div class="inline-block">Box 1</div>
    <div class="inline-block">Box 2</div>
    <div class="inline-block">Box 3</div>

    <h2>4. display: flex</h2>
    <div class="flex">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>

    <h2>5. display: flex with flex-wrap</h2>
    <div class="flex-wrap">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
    </div>




























</body>

</html>
